<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP Access Test</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p>جارٍ التحقق من الهوية…</p>
  </div>

  <div id="denied-screen" class="hidden">
    <div class="box denied-box">
      <div class="icon">⛔</div>
      <h1>Access Denied</h1>
      <p>غير مصرّح لك بالوصول</p>
      <div class="ip-badge denied-ip" id="visitor-ip"></div>
    </div>
  </div>

  <div id="main-content" class="hidden">
    <div class="box success-box">
      <div class="icon">✅</div>
      <h1>Access Granted</h1>
      <p>مرحباً، تم التحقق من هويتك بنجاح</p>
      <div class="ip-badge success-ip" id="allowed-ip"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
